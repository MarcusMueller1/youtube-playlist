<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YouTube Playlist</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: #111318;
    color: #e6e8ee;
    display: flex;
    overflow: hidden;
    user-select: none;
  }

  /* ---- Left library bar ---- */
  #leftbar {
    width: 250px;
    background: #14161c;
    border-right: 1px solid #262a33;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  #leftTabs { display: flex; border-bottom: 1px solid #262a33; }
  .tab {
    flex: 1;
    background: none;
    border: none;
    color: #8b93a5;
    padding: 12px 0;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 2px solid transparent;
  }
  .tab:hover { color: #cfd3dc; }
  .tab.active { color: #e6e8ee; border-bottom-color: #5b8def; }

  .pane { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .pane[hidden] { display: none; }

  #saveRow { display: flex; gap: 6px; padding: 10px; border-bottom: 1px solid #262a33; }
  #saveName {
    flex: 1; min-width: 0; background: #0e1014; border: 1px solid #2c313c;
    color: #e6e8ee; border-radius: 6px; padding: 7px 10px; font-size: 13px;
  }
  #saveName:focus { outline: none; border-color: #4a556e; }
  #saveBtn {
    background: #2c3a55; border: none; color: #cfe0ff; border-radius: 6px;
    padding: 0 12px; cursor: pointer; font-size: 15px;
  }
  #saveBtn:hover { background: #3a4c70; }

  .plist { flex: 1; overflow-y: auto; padding: 6px; }
  .plist::-webkit-scrollbar { width: 8px; }
  .plist::-webkit-scrollbar-thumb { background: #2c313c; border-radius: 4px; }
  .plist .empty { color: #6b7280; font-size: 12px; padding: 14px 10px; line-height: 1.5; }

  .pentry {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 10px; border-radius: 8px; cursor: pointer;
  }
  .pentry:hover { background: #20242d; }
  .pentry .pmeta { flex: 1; min-width: 0; }
  .pentry .pname {
    font-size: 13px; color: #dfe3ea;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .pentry .pinfo {
    font-size: 11px; color: #6b7280; margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .pentry .pdel {
    background: none; border: none; color: #6b7280; cursor: pointer;
    font-size: 14px; padding: 4px; flex-shrink: 0; visibility: hidden;
  }
  .pentry:hover .pdel { visibility: visible; }
  .pentry .pdel:hover { color: #f28b82; }

  /* ---- Player area ---- */
  #playerPane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  #videoWrap {
    flex: 1;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    min-height: 0;
  }
  video { width: 100%; height: 100%; }
  #emptyHint {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: #6b7280;
    text-align: center;
    padding: 24px;
    pointer-events: none;
  }
  #emptyHint .big { font-size: 42px; }
  #emptyHint .msg { font-size: 15px; line-height: 1.6; max-width: 420px; }

  #nowBar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: #191c23;
    border-top: 1px solid #262a33;
  }
  #nowTitle {
    flex: 1;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: #cfd3dc;
  }
  .btn {
    background: #262a33;
    border: none;
    color: #e6e8ee;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }
  .btn:hover { background: #333947; }
  #status { font-size: 12px; color: #8b93a5; padding: 0 4px; max-width: 300px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #status.error { color: #f28b82; }
  #volSlider {
    width: 110px;
    accent-color: #5b8def;
    cursor: pointer;
  }

  /* ---- Playlist sidebar (current queue) ---- */
  #sidebar {
    width: 320px;
    background: #171a20;
    border-left: 1px solid #262a33;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  #sidebarHead {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border-bottom: 1px solid #262a33;
  }
  #sidebarHead h2 { font-size: 14px; font-weight: 600; color: #cfd3dc;
                    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #sidebarHead .small {
    background: none; border: none; color: #8b93a5;
    cursor: pointer; font-size: 12px; flex-shrink: 0;
  }
  #sidebarHead .small:hover { color: #f28b82; }

  #urlRow { display: flex; gap: 6px; padding: 10px 12px; border-bottom: 1px solid #262a33; }
  #urlInput {
    flex: 1; min-width: 0; background: #0e1014; border: 1px solid #2c313c;
    color: #e6e8ee; border-radius: 6px; padding: 7px 10px; font-size: 13px;
  }
  #urlInput:focus { outline: none; border-color: #4a556e; }

  #list { flex: 1; overflow-y: auto; padding: 6px; }
  #list::-webkit-scrollbar { width: 8px; }
  #list::-webkit-scrollbar-thumb { background: #2c313c; border-radius: 4px; }

  .item {
    display: flex;
    gap: 10px;
    padding: 8px;
    border-radius: 8px;
    cursor: pointer;
    align-items: center;
    position: relative;
  }
  .item:hover { background: #20242d; }
  .item.playing { background: #263042; outline: 1px solid #3b4a68; }
  .item.dragover-above::before, .item.dragover-below::after {
    content: ""; position: absolute; left: 4px; right: 4px; height: 2px;
    background: #5b8def; border-radius: 1px;
  }
  .item.dragover-above::before { top: -1px; }
  .item.dragover-below::after { bottom: -1px; }
  .item img {
    width: 96px; height: 54px; object-fit: cover;
    border-radius: 5px; background: #0e1014; flex-shrink: 0;
  }
  .item .meta { flex: 1; min-width: 0; }
  .item .title {
    font-size: 13px; line-height: 1.35; color: #dfe3ea;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .item .idx { font-size: 11px; color: #6b7280; margin-top: 3px; }
  .item .remove {
    background: none; border: none; color: #6b7280; cursor: pointer;
    font-size: 16px; padding: 4px; flex-shrink: 0; visibility: hidden;
  }
  .item:hover .remove { visibility: visible; }
  .item .remove:hover { color: #f28b82; }

  /* ---- Drop overlay ---- */
  #dropOverlay {
    position: fixed; inset: 0;
    background: rgba(30, 60, 120, 0.35);
    border: 3px dashed #5b8def;
    display: none;
    align-items: center; justify-content: center;
    z-index: 10;
    font-size: 22px; color: #cfe0ff;
    pointer-events: none;
  }
  body.dragging #dropOverlay { display: flex; }
</style>
</head>
<body>

<div id="leftbar">
  <div id="leftTabs">
    <button class="tab active" data-tab="saved">Saved</button>
    <button class="tab" data-tab="recent">Recent</button>
  </div>
  <div class="pane" id="savedPane">
    <div id="saveRow">
      <input id="saveName" type="text" placeholder="Name current playlist…">
      <button id="saveBtn" title="Save current playlist">💾</button>
    </div>
    <div class="plist" id="savedList"></div>
  </div>
  <div class="pane" id="recentPane" hidden>
    <div class="plist" id="recentList"></div>
  </div>
</div>

<div id="playerPane">
  <div id="videoWrap">
    <video id="video" controls></video>
    <audio id="audio" style="display:none"></audio>
    <div id="emptyHint">
      <div class="big">🎬</div>
      <div class="msg">
        <strong>Drop YouTube videos here</strong><br>
        Drag the URL from your browser's address bar (grab the padlock icon)
        or drag any video link into this window.<br>
        You can also paste a URL with <kbd>Ctrl+V</kbd>.
      </div>
    </div>
  </div>
  <div id="nowBar">
    <button class="btn" id="prevBtn" title="Previous">⏮</button>
    <button class="btn" id="playBtn" title="Play/Pause">▶</button>
    <button class="btn" id="nextBtn" title="Next">⏭</button>
    <div id="nowTitle">Nothing playing</div>
    <div id="status"></div>
    <button class="btn" id="muteBtn" title="Mute">🔊</button>
    <input id="volSlider" type="range" min="0" max="100" step="1" title="Volume">
  </div>
</div>

<div id="sidebar">
  <div id="sidebarHead">
    <h2 id="listHead">Playlist (0)</h2>
    <button class="small" id="clearBtn">clear all</button>
  </div>
  <div id="urlRow">
    <input id="urlInput" type="text" placeholder="…or paste a YouTube URL and press Enter">
  </div>
  <div id="list"></div>
</div>

<div id="dropOverlay">＋ Drop to add to playlist</div>

<script src="renderer.js"></script>
</body>
</html>
