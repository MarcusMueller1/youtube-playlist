name: Build installers

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload installers to"
        required: true

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run setup
      - run: npx electron-builder --win --publish never
      # latest.yml + blockmap are what the in-app updater reads; the artifact
      # name must stay space-free or GitHub renames it and the updater 404s.
      - run: gh release upload "${{ github.event.release.tag_name || inputs.tag }}" "dist/YouTube-Playlist-Setup.exe" "dist/YouTube-Playlist-Setup.exe.blockmap" "dist/latest.yml" --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run setup:linux
      - run: npx electron-builder --linux --publish never
      - run: gh release upload "${{ github.event.release.tag_name || inputs.tag }}" dist/*.AppImage dist/latest-linux.yml --clobber
        env:
          GH_TOKEN: ${{ github.token }}
